<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0D0D0D" />
  <title>VITTA UP</title>
  <style>
    html, body, #root, #root > div, #root > div > div {
      background: linear-gradient(160deg, #0D0D0D 0%, #1A1008 40%, #181010 70%, #0D0D0D 100%) !important;
      background-attachment: fixed !important;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
    }
    body {
      overflow: hidden;
      color: #FFFFFF;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }
    #root {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    /* Override any white backgrounds from RNW */
    #root > div[style] {
      background: transparent !important;
    }
    /* Hide scrollbar for mobile feel */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
